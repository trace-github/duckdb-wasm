<pre id="out">Ping test...</pre>
<script>
const out = document.getElementById('out');
out.textContent += '\nCOI: ' + crossOriginIsolated;

  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify({ status: 'PING', crossOriginIsolated, logs: [{ level: 'info', message: 'ping ok' }], results: [] })
